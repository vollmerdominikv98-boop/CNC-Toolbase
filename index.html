<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CNC Schnittwert-Assistent</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-color: #0b0f19; --card-bg: #131a26; --accent-yellow: #f5b82e; --accent-green: #10b981; --text-main: #ffffff; --text-muted: #8b9bb4; --border-color: #223147; }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: 'Inter', sans-serif; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        .wizard-step { display: none; }
        .wizard-step.active { display: block; }
        .grid-layout { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; margin-top: 20px; }
        .card { background: var(--card-bg); border: 1px solid var(--border-color); padding: 20px; border-radius: 10px; cursor: pointer; transition: 0.2s; }
        .card:hover { border-color: var(--accent-yellow); }
        .card.selected { border-color: var(--accent-green); background: #0f3424; }
        .btn { padding: 10px 20px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; }
        .btn-next { background: var(--accent-yellow); }
        .admin-panel { display: none; background: #1b2537; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        .admin-panel.active { display: block; }
    </style>
</head>
<body>

<div class="container">
    <h1>CNC Schnittwert-Assistent</h1>
    <button class="btn" onclick="document.getElementById('adminPanel').classList.toggle('active')">Admin-Panel</button>

    <div id="adminPanel" class="admin-panel">
        <h3>Neues Material</h3>
        <input type="text" id="matName" placeholder="Name">
        <input type="number" id="matVc" placeholder="Vc">
        <input type="number" id="matFz" step="0.01" placeholder="Fz">
        <button onclick="addCustomMaterial()">Speichern</button>
    </div>

    <!-- Schritte -->
    <div id="step1" class="wizard-step active">
        <h2>Material wählen</h2>
        <div class="grid-layout" id="materialsGrid"></div>
    </div>
    <div id="step2" class="wizard-step">
        <h2>Kategorie wählen</h2>
        <div class="grid-layout" id="categoriesGrid"></div>
    </div>
    <div id="step3" class="wizard-step">
        <h2>Werkzeug wählen</h2>
        <div class="grid-layout" id="toolsGrid"></div>
    </div>
    <div id="step4" class="wizard-step">
        <h2>Bearbeitung</h2>
        <div class="grid-layout" id="machiningGrid"></div>
    </div>
    <div id="step5" class="wizard-step">
        <h2>Ergebnis</h2>
        <div id="results"></div>
        <button class="btn" onclick="location.reload()">Neu starten</button>
    </div>

    <div style="margin-top: 30px;">
        <button id="btnBack" class="btn" onclick="changeStep(-1)">Zurück</button>
        <button id="btnNext" class="btn btn-next" onclick="changeStep(1)" disabled>Weiter</button>
    </div>
</div>

<script>
    // Daten
    let materials = JSON.parse(localStorage.getItem('cnc_materials')) || [{id: 'alu', name: 'Aluminium', vc: 350, fz: 0.08}];
    const categories = [{id: 'schaft', name: 'Schaftfräser'}, {id: 'plan', name: 'Planfräser'}];
    const tools = {schaft: [{id: 's6', name: 'Schaft 6mm', d: 6, z: 2}], plan: [{id: 'p40', name: 'Plan 40mm', d: 40, z: 5}]};
    const mach = [{id: 'schrupp', name: 'Schruppen', factor: 1.0}, {id: 'schlicht', name: 'Schlichten', factor: 1.2}];

    let selection = {material: null, category: null, tool: null, machining: null};
    let currentStep = 1;

    function render() {
        document.getElementById('materialsGrid').innerHTML = materials.map(m => `<div class="card ${selection.material?.id == m.id ? 'selected' : ''}" onclick="select('material', ${JSON.stringify(m).replace(/"/g, '&quot;')})">${m.name}</div>`).join('');
        document.getElementById('categoriesGrid').innerHTML = categories.map(c => `<div class="card ${selection.category?.id == c.id ? 'selected' : ''}" onclick="select('category', ${JSON.stringify(c).replace(/"/g, '&quot;')})">${c.name}</div>`).join('');
        if(selection.category) {
            document.getElementById('toolsGrid').innerHTML = tools[selection.category.id].map(t => `<div class="card ${selection.tool?.id == t.id ? 'selected' : ''}" onclick="select('tool', ${JSON.stringify(t).replace(/"/g, '&quot;')})">${t.name}</div>`).join('');
        }
        document.getElementById('machiningGrid').innerHTML = mach.map(m => `<div class="card ${selection.machining?.id == m.id ? 'selected' : ''}" onclick="select('machining', ${JSON.stringify(m).replace(/"/g, '&quot;')})">${m.name}</div>`).join('');
    }

    function select(type, item) {
        selection[type] = item;
        if(type === 'category') selection.tool = null;
        document.getElementById('btnNext').disabled = false;
        render();
    }

    function changeStep(dir) {
        currentStep += dir;
        document.querySelectorAll('.wizard-step').forEach((s, i) => s.classList.toggle('active', i + 1 === currentStep));
        if(currentStep === 5) calculate();
        document.getElementById('btnNext').disabled = true;
    }

    function calculate() {
        const {material, tool, machining} = selection;
        const vc = material.vc * machining.factor;
        const n = Math.round((vc * 1000) / (Math.PI * tool.d));
        const vf = Math.round(n * tool.z * material.fz);
        document.getElementById('results').innerHTML = `<p>Drehzahl: ${n} U/min</p><p>Vorschub: ${vf} mm/min</p>`;
    }

    function addCustomMaterial() {
        materials.push({id: 'm'+Date.now(), name: document.getElementById('matName').value, vc: parseFloat(document.getElementById('matVc').value), fz: parseFloat(document.getElementById('matFz').value)});
        localStorage.setItem('cnc_materials', JSON.stringify(materials));
        render();
    }

    render();
</script>

</body>
</html>
