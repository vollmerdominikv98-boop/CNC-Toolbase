<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CNC Schnittwert-Assistent</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #131a26;
            --card-hover: #1b2537;
            --card-selected: #0f3424;
            --text-main: #ffffff;
            --text-muted: #8b9bb4;
            --accent-yellow: #f5b82e;
            --accent-yellow-hover: #e5a91c;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --border-color: #223147;
            --border-selected: #10b981;
            --font-family: 'Inter', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: var(--font-family); min-height: 100vh; display: flex; flex-direction: column; padding: 40px 20px; }
        .container { max-width: 1000px; width: 100%; margin: 0 auto; flex-grow: 1; display: flex; flex-direction: column; }
        header { margin-bottom: 40px; }
        .logo-section { display: flex; align-items: center; justify-content: space-between; margin-bottom: 30px; }
        .logo-meta { display: flex; align-items: center; gap: 15px; }
        .logo-icon { background-color: var(--accent-yellow); color: #000; width: 45px; height: 45px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; }
        .logo-title h1 { font-size: 1.5rem; font-weight: 700; }
        .logo-title p { font-size: 0.8rem; color: var(--text-muted); }
        .btn-admin-toggle { background: none; border: 1px solid var(--border-color); color: var(--text-muted); padding: 8px 14px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; }
        
        .progress-steps { display: flex; justify-content: space-between; align-items: center; position: relative; margin-bottom: 50px; }
        .progress-line { position: absolute; top: 20px; left: 0; height: 2px; background-color: var(--border-color); width: 100%; z-index: 1; }
        .progress-line-fill { position: absolute; top: 20px; left: 0; height: 2px; background-color: var(--accent-green); width: 0%; z-index: 1; transition: width 0.3s ease; }
        .step-item { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; width: 80px; }
        .step-circle { width: 40px; height: 40px; border-radius: 50%; background-color: var(--card-bg); border: 2px solid var(--border-color); display: flex; align-items: center; justify-content: center; font-weight: 600; color: var(--text-muted); }
        .step-item.active .step-circle { border-color: var(--accent-yellow); color: var(--accent-yellow); }
        .step-item.completed .step-circle { border-color: var(--accent-green); background-color: var(--accent-green); color: #000; }
        .step-label { margin-top: 10px; font-size: 0.7rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; }

        .wizard-step { display: none; flex-direction: column; animation: fadeIn 0.4s ease-in-out; }
        .wizard-step.active { display: flex; }
        .step-title { text-align: center; font-size: 1.4rem; margin-bottom: 35px; }
        .grid-layout { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .card { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 24px; cursor: pointer; position: relative; display: flex; flex-direction: column; gap: 15px; }
        .card.selected { background-color: var(--card-selected); border-color: var(--border-selected); }
        .card-title { font-size: 1.15rem; font-weight: 600; }
        .card-description { font-size: 0.85rem; color: var(--text-muted); }
        
        .admin-panel { display: none; background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 25px; margin-bottom: 40px; }
        .admin-panel.active { display: block; }
        .admin-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; }
        .form-group { margin-bottom: 12px; display: flex; flex-direction: column; }
        .form-group input, .form-group select { background-color: var(--bg-color); border: 1px solid var(--border-color); padding: 10px; border-radius: 6px; color: white; }
        .btn-submit-admin { background-color: var(--accent-green); color: black; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; width: 100%; }

        .results-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; }
        .result-box { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 24px; }
        .result-value { font-size: 2.2rem; font-weight: 700; }
        .navigation-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border-color); padding-top: 30px; margin-top: auto; }
        .btn-next { background-color: var(--accent-yellow); color: #000; border: none; padding: 14px 28px; border-radius: 8px; font-weight: 600; cursor: pointer; }
        .btn-next:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-restart { background-color: var(--accent-yellow); color: #000; border: none; padding: 16px 36px; border-radius: 8px; font-weight: 700; cursor: pointer; }
        .check-badge { position: absolute; top: 20px; right: 20px; background-color: var(--accent-green); color: #000; width: 20px; height: 20px; border-radius: 50%; display: none; align-items: center; justify-content: center; }
        .card.selected .check-badge { display: flex; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo-section">
            <div class="logo-meta">
                <div class="logo-icon"><i class="fa-solid fa-microchip"></i></div>
                <div class="logo-title">
                    <h1>CNC Schnittwert-Assistent</h1>
                    <p>Material • Werkzeug • Bearbeitung → Schnittwerte</p>
                </div>
            </div>
            <button class="btn-admin-toggle" id="btnAdminToggle"><i class="fa-solid fa-plus"></i> Element hinzufügen</button>
        </div>

        <div class="admin-panel" id="adminPanel">
            <div class="admin-grid">
                <div class="admin-section">
                    <h3>Neues Material</h3>
                    <div class="form-group"><label>Name</label><input type="text" id="matName"></div>
                    <div class="form-group"><label>Vc (m/min)</label><input type="number" id="matVc"></div>
                    <div class="form-group"><label>Fz (mm)</label><input type="number" id="matFz" step="0.01"></div>
                    <button class="btn-submit-admin" onclick="addCustomMaterial()">Speichern</button>
                </div>
                <div class="admin-section">
                    <h3>Neuer Fräser</h3>
                    <div class="form-group"><label>Kategorie</label><select id="toolCat"><option value="schaft">Schaftfräser</option></select></div>
                    <div class="form-group"><label>Name</label><input type="text" id="toolName"></div>
                    <div class="form-group"><label>Ø (mm)</label><input type="number" id="toolD"></div>
                    <div class="form-group"><label>Zähne (z)</label><input type="number" id="toolZ"></div>
                    <button class="btn-submit-admin" onclick="addCustomTool()">Speichern</button>
                </div>
            </div>
        </div>

        <div class="progress-steps">
            <div class="progress-line"></div>
            <div class="progress-line-fill" id="progressLineFill"></div>
            <div class="step-item active" data-step="1"><div class="step-circle">1</div><div class="step-label">Material</div></div>
            <div class="step-item" data-step="2"><div class="step-circle">2</div><div class="step-label">Kategorie</div></div>
            <div class="step-item" data-step="3"><div class="step-circle">3</div><div class="step-label">Werkzeug</div></div>
            <div class="step-item" data-step="4"><div class="step-circle">4</div><div class="step-label">Bearb.</div></div>
            <div class="step-item" data-step="5"><div class="step-circle">5</div><div class="step-label">Ergebnis</div></div>
        </div>
    </header>

    <div class="wizard-step active" id="step1"><h2 class="step-title">Material wählen</h2><div class="grid-layout" id="materialsGrid"></div></div>
    <div class="wizard-step" id="step2"><h2 class="step-title">Kategorie</h2><div class="grid-layout" id="categoriesGrid"></div></div>
    <div class="wizard-step" id="step3"><h2 class="step-title">Werkzeug</h2><div class="grid-layout" id="toolsGrid"></div></div>
    <div class="wizard-step" id="step4"><h2 class="step-title">Bearbeitungsart</h2><div class="grid-layout" id="machiningGrid"></div></div>
    <div class="wizard-step" id="step5">
        <h2 class="step-title">Ergebnisse</h2>
        <div class="results-grid">
            <div class="result-box"><div class="result-value" id="resVc">0</div><span>Vc (m/min)</span></div>
            <div class="result-box"><div class="result-value" id="resN">0</div><span>U/min</span></div>
            <div class="result-box"><div class="result-value" id="resVf">0</div><span>Vf (mm/min)</span></div>
        </div>
        <div style="text-align: center; margin-top: 40px;"><button class="btn-restart" onclick="location.reload()">Neue Berechnung</button></div>
    </div>

    <div class="navigation-footer" id="navFooter">
        <button class="btn-next" style="background:transparent; color:white; border:1px solid #223147" id="btnBack">Zurück</button>
        <button class="btn-next" id="btnNext" disabled>Weiter</button>
    </div>
</div>

<script>
    // Initialdaten mit trochoidaler Option
    let materials = JSON.parse(localStorage.getItem('cnc_materials')) || [
        { id: 'alu', name: 'Aluminium', vc: 350, fz: 0.08 },
        { id: 'stahl', name: 'Stahl', vc: 160, fz: 0.05 }
    ];
    let toolsData = JSON.parse(localStorage.getItem('cnc_tools')) || {
        schaft: [{ id: 's6', name: 'Schaftfräser 6mm', d: 6, z: 3 }]
    };
    let machiningOptions = [
        { id: 'schruppen', name: 'Schruppen', preset: 'schruppen', icon: 'fa-layer-group' },
        { id: 'trochoidal', name: 'Trochoidales Schruppen', preset: 'trochoidal', icon: 'fa-hurricane' },
        { id: 'schlichten', name: 'Schlichten', preset: 'schlichten', icon: 'fa-sparkles' }
    ];

    let currentStep = 1;
    let selection = { material: null, category: null, tool: null, machining: null };

    // Logik für Berechnung
    function calculateSchnittwerte() {
        const mat = materials.find(m => m.id === selection.material);
        const tool = toolsData[selection.category].find(t => t.id === selection.tool);
        const mach = machiningOptions.find(o => o.id === selection.machining);
        
        let vc = mat.vc;
        let fz = mat.fz;
        
        if (mach.preset === 'trochoidal') {
            vc *= 1.5;
            fz *= 1.2;
        } else if (mach.preset === 'schlichten') {
            vc *= 1.2;
            fz *= 0.6;
        }

        const n = Math.round((vc * 1000) / (Math.PI * tool.d));
        const vf = Math.round(n * tool.z * fz);

        document.getElementById('resVc').innerText = Math.round(vc);
        document.getElementById('resN').innerText = n;
        document.getElementById('resVf').innerText = vf;
    }

    // Wizard-Steuerung und Rendering (vereinfacht für Darstellung)
    function selectItem(type, id) {
        selection[type] = id;
        if (type === 'category') renderTools();
        document.getElementById('btnNext').disabled = false;
    }

    // ... (Hier würde die restliche Render-Logik folgen wie in Ihrer Originaldatei)
    window.onload = () => {
        // Init Rendering...
    };
</script>
</body>
</html>
